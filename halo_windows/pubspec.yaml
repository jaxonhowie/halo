name: halo_windows
description: "Halo - macOS desktop pixel cat pet, now on Windows"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  window_manager: ^0.4.3
  system_tray: ^2.0.3
  shared_preferences: ^2.3.4
  fl_chart: ^0.70.2
  win32: ^5.10.0
  ffi: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sprites/idle/
    - assets/sprites/walk/
    - assets/sprites/sleep/
    - assets/sprites/wantFish/
    - assets/sprites/jump/
